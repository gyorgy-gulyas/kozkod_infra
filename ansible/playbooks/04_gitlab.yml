---
- name: GitLab CE telepítése és konfigurálása
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:

    # ── 1. Csomag telepítése ────────────────────────────────────────────────────

    - name: GitLab apt repo hozzáadása
      shell: curl -sS https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.deb.sh | bash
      args:
        creates: /etc/apt/sources.list.d/gitlab_gitlab-ce.list

    - name: /etc/gitlab/ mappa létrehozása (telepítés előtt)
      file:
        path: /etc/gitlab
        state: directory
        mode: '0755'

    - name: gitlab.rb előre létrehozása (telepítés előtt — postinstall script ezt olvassa)
      template:
        src: ../templates/gitlab/gitlab.rb.j2
        dest: /etc/gitlab/gitlab.rb
        mode: '0600'
        force: no

    - name: GitLab CE telepítése (EXTERNAL_URL env-vel, idempotens)
      shell: EXTERNAL_URL="https://{{ gitlab_domain }}" apt-get install -y gitlab-ce
      args:
        creates: /opt/gitlab/embedded/bin/ruby
      environment:
        DEBIAN_FRONTEND: noninteractive

    # ── 2. Konfiguráció alkalmazása ─────────────────────────────────────────────

    - name: gitlab.rb végleges konfiguráció (mindig felülírja)
      template:
        src: ../templates/gitlab/gitlab.rb.j2
        dest: /etc/gitlab/gitlab.rb
        mode: '0600'
      register: gitlab_rb_changed

    - name: GitLab reconfigure (ha konfig változott)
      command: gitlab-ctl reconfigure
      when: gitlab_rb_changed.changed

    - name: GitLab reconfigure (első telepítésnél mindig)
      command: gitlab-ctl reconfigure
      args:
        creates: /var/opt/gitlab/bootstrapped

    # ── 3. SSL cert ─────────────────────────────────────────────────────────────

    - name: Certbot cert igénylése gitlab.kozkod.hu-ra
      command: >
        certbot certonly --nginx --non-interactive --agree-tos
        --email {{ ssl_email }} -d {{ gitlab_domain }}
      args:
        creates: /etc/letsencrypt/live/{{ gitlab_domain }}/fullchain.pem

    # ── 4. Nginx konfig ─────────────────────────────────────────────────────────

    - name: Nginx konfig gitlab.kozkod.hu-ra
      template:
        src: ../templates/nginx/gitlab.conf.j2
        dest: /etc/nginx/sites-available/gitlab
      notify: nginx reload

    - name: GitLab site engedélyezése
      file:
        src: /etc/nginx/sites-available/gitlab
        dest: /etc/nginx/sites-enabled/gitlab
        state: link
      notify: nginx reload

    # ── 5. Service account token ────────────────────────────────────────────────

    - name: Service token Ruby script másolása
      template:
        src: ../templates/gitlab/create_service_token.rb.j2
        dest: /var/opt/gitlab/create_service_token.rb
        mode: '0644'

    - name: GitLab service token létrehozása (idempotens — csak ha nincs még token fájl)
      command: gitlab-rails runner /var/opt/gitlab/create_service_token.rb
      args:
        creates: /tmp/service_token.txt
      register: token_created

    - name: Service token beolvasása
      slurp:
        src: /tmp/service_token.txt
      register: service_token_file

    - name: GITLAB_SERVICE_TOKEN hozzáadása platform .env-hez
      lineinfile:
        path: "{{ platform_dir }}/backend/.env"
        regexp: '^GITLAB_SERVICE_TOKEN='
        line: "GITLAB_SERVICE_TOKEN={{ service_token_file.content | b64decode | trim }}"
        owner: www-data
        group: www-data

    - name: GITLAB_URL hozzáadása platform .env-hez
      lineinfile:
        path: "{{ platform_dir }}/backend/.env"
        regexp: '^GITLAB_URL='
        line: "GITLAB_URL=https://{{ gitlab_domain }}"
        owner: www-data
        group: www-data

    - name: Platform service újraindítása (token frissült)
      service:
        name: kozkod-platform
        state: restarted
      when: token_created.changed

    - name: Script törlése (token megvan)
      file:
        path: /var/opt/gitlab/create_service_token.rb
        state: absent

  handlers:
    - name: nginx reload
      service:
        name: nginx
        state: reloaded
