---
- name: GitLab CE telepítése
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:

    # ── 1. GitLab CE csomag telepítése ─────────────────────────────────────────

    - name: GitLab apt repo hozzáadása
      shell: curl -sS https://packages.gitlab.com/install/repositories/gitlab/gitlab-ce/script.deb.sh | bash
      args:
        creates: /etc/apt/sources.list.d/gitlab_gitlab-ce.list

    - name: GitLab CE telepítése (saját Nginx nélkül)
      apt:
        name: gitlab-ce
        state: present
      environment:
        EXTERNAL_URL: "https://{{ gitlab_domain }}"

    # ── 2. GitLab konfigurálása ─────────────────────────────────────────────────

    - name: GitLab konfiguráció (gitlab.rb)
      copy:
        dest: /etc/gitlab/gitlab.rb
        mode: '0600'
        content: |
          external_url 'https://{{ gitlab_domain }}'

          # Beépített Nginx kikapcsolva — a mi Nginx-ünk kezeli
          nginx['enable'] = false
          web_server['external_users'] = ['www-data']

          # GitLab Workhorse belső porton
          gitlab_workhorse['listen_network'] = 'tcp'
          gitlab_workhorse['listen_addr'] = '127.0.0.1:8181'

          # Biztonsági beállítások — csak platform hozhat létre usert
          gitlab_rails['gitlab_signup_enabled'] = false
          gitlab_rails['gitlab_default_can_create_group'] = false

          # Web jelszavas belépés letiltva (platform SSO lesz)
          gitlab_rails['omniauth_allow_single_sign_on'] = false
          gitlab_rails['password_authentication_enabled_for_web'] = false
          gitlab_rails['password_authentication_enabled_for_git'] = true

          # Email
          gitlab_rails['smtp_enable'] = true
          gitlab_rails['smtp_address'] = '{{ email_host }}'
          gitlab_rails['smtp_port'] = {{ email_port }}
          gitlab_rails['smtp_user_name'] = '{{ email_host_user }}'
          gitlab_rails['smtp_password'] = '{{ email_host_password }}'
          gitlab_rails['smtp_domain'] = 'kozkod.hu'
          gitlab_rails['smtp_authentication'] = 'login'
          gitlab_rails['smtp_enable_starttls_auto'] = true
          gitlab_rails['gitlab_email_from'] = '{{ email_host_user }}'
          gitlab_rails['gitlab_email_reply_to'] = '{{ email_host_user }}'

          # Időzóna
          gitlab_rails['time_zone'] = 'Europe/Budapest'

          # Backup
          gitlab_rails['backup_keep_time'] = 604800

          # Let's Encrypt kikapcsolva (mi kezeljük certbot-tal)
          letsencrypt['enable'] = false
      notify: gitlab reconfigure

    - name: GitLab reconfigure futtatása
      command: gitlab-ctl reconfigure
      args:
        creates: /var/opt/gitlab/bootstrapped

    # ── 3. SSL cert a gitlab domain-re ─────────────────────────────────────────

    - name: Certbot cert igénylése gitlab.kozkod.hu-ra
      command: >
        certbot certonly --nginx
        --non-interactive --agree-tos
        --email {{ ssl_email }}
        -d {{ gitlab_domain }}
      args:
        creates: /etc/letsencrypt/live/{{ gitlab_domain }}/fullchain.pem

    # ── 4. Nginx konfig a gitlab domain-re ─────────────────────────────────────

    - name: Nginx konfig gitlab.kozkod.hu-ra
      template:
        src: ../templates/nginx/gitlab.conf.j2
        dest: /etc/nginx/sites-available/gitlab
      notify: nginx reload

    - name: GitLab site engedélyezése
      file:
        src: /etc/nginx/sites-available/gitlab
        dest: /etc/nginx/sites-enabled/gitlab
        state: link
      notify: nginx reload

  handlers:
    - name: gitlab reconfigure
      command: gitlab-ctl reconfigure

    - name: nginx reload
      service:
        name: nginx
        state: reloaded
